# Recipe: ctx4_gen1_dep32_batch4_eplb0_mtp3
# Topology: 4 prefill (TP=2, EP=2, ADP=true → 2 GPUs on 1 node) + 1 decode (TP=32, EP=32, 32 GPUs on 8 nodes)
# Total: 40 GPUs, 12 nodes (4×1 prefill + 8 decode = 12 of our 16 nodes)
# Target concurrency: 180

prefill:
  workers: 4
  gpus: 2
  nodesPerWorker: 1
  tensorParallelSize: 2
  moeExpertParallelSize: 2
  maxBatchSize: 2
  maxNumTokens: 16640
  maxSeqLen: 8232
  engine:
    pipeline_parallel_size: 1
    print_iter_log: true
    kv_cache_config:
      enable_block_reuse: false
      dtype: fp8
      free_gpu_memory_fraction: 0.6
    cache_transceiver_config:
      backend: UCX
      max_tokens_in_buffer: 16384
    moe_config:
      backend: TRTLLM
    nvfp4_gemm_config:
      allowed_backends:
        - cutlass
        - cublaslt
        - cutedsl
        - cuda_core
    speculative_config:
      decoding_type: MTP
      num_nextn_predict_layers: 3
    cuda_graph_config: null
    enable_attention_dp: true
    disable_overlap_scheduler: true

decode:
  workers: 1
  gpus: 32
  nodesPerWorker: 8
  tensorParallelSize: 32
  moeExpertParallelSize: 32
  maxBatchSize: 4
  maxNumTokens: 16
  maxSeqLen: 9256
  engine:
    pipeline_parallel_size: 1
    print_iter_log: true
    kv_cache_config:
      enable_block_reuse: false
      dtype: fp8
      free_gpu_memory_fraction: 0.75
    cache_transceiver_config:
      backend: UCX
      max_tokens_in_buffer: 16384
    moe_config:
      backend: CUTEDSL
      use_low_precision_moe_combine: true
    nvfp4_gemm_config:
      allowed_backends:
        - cutlass
        - cublaslt
        - cutedsl
        - cuda_core
    speculative_config:
      decoding_type: MTP
      num_nextn_predict_layers: 3
    cuda_graph_config:
      batch_sizes:
        - 1
        - 2
        - 4
      enable_padding: true
    enable_attention_dp: true
    enable_lm_head_tp_in_adp: true
    stream_interval: 100
    num_postprocess_workers: 4

benchmark:
  concurrency: 180
  isl: 8192
  osl: 1024
