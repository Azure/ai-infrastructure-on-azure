# Recipe: ctx10_gen1_dep16_batch32_eplb0_mtp3
# Topology: 10 prefill (TP=2, EP=2, 2 GPUs on 1 node) + 1 decode (TP=16, EP=16, 16 GPUs on 4 nodes)
# Total: 36 GPUs, 14 worker nodes + 1 frontend = 15 nodes
# Target concurrency: 666

prefill:
  workers: 10
  gpus: 2
  nodesPerWorker: 1
  tensorParallelSize: 2
  moeExpertParallelSize: 2
  maxBatchSize: 2
  maxNumTokens: 16640
  maxSeqLen: 8232
  engine:
    pipeline_parallel_size: 1
    print_iter_log: true
    kv_cache_config:
      enable_block_reuse: false
      dtype: fp8
      free_gpu_memory_fraction: 0.6
    cache_transceiver_config:
      backend: UCX
      max_tokens_in_buffer: 16384
    moe_config:
      backend: TRTLLM
    nvfp4_gemm_config:
      allowed_backends:
      - cutlass
      - cublaslt
      - cutedsl
      - cuda_core
    speculative_config:
      decoding_type: MTP
      num_nextn_predict_layers: 3
    cuda_graph_config: null
    enable_attention_dp: true
    disable_overlap_scheduler: true

decode:
  workers: 1
  gpus: 16
  nodesPerWorker: 4
  tensorParallelSize: 16
  moeExpertParallelSize: 16
  maxBatchSize: 32
  maxNumTokens: 128
  maxSeqLen: 9256
  engine:
    pipeline_parallel_size: 1
    print_iter_log: true
    kv_cache_config:
      enable_block_reuse: false
      dtype: fp8
      free_gpu_memory_fraction: 0.8
    cache_transceiver_config:
      backend: UCX
      max_tokens_in_buffer: 16384
    moe_config:
      backend: CUTEDSL
      use_low_precision_moe_combine: true
    nvfp4_gemm_config:
      allowed_backends:
      - cutlass
      - cublaslt
      - cutedsl
      - cuda_core
    speculative_config:
      decoding_type: MTP
      num_nextn_predict_layers: 3
    cuda_graph_config:
      batch_sizes:
      - 1
      - 2
      - 4
      - 8
      - 16
      - 24
      - 32
      enable_padding: true
    enable_attention_dp: true
    enable_lm_head_tp_in_adp: true
    stream_interval: 100
    num_postprocess_workers: 4

benchmark:
  concurrency: 666
  isl: 8192
  osl: 1024
