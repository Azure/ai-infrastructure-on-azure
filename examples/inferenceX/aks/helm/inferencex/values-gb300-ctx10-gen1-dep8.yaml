# Recipe: ctx10_gen1_dep8_batch256_eplb0_mtp1
# Topology: 10 prefill (TP=2, EP=2, 2 GPUs on 1 node) + 1 decode (TP=8, EP=8, 8 GPUs on 2 nodes)
# Total: 28 GPUs, 12 worker nodes + 1 frontend = 13 nodes
# Target concurrency: 2253
# Note: MTP=1 (not 3) and batch=256 for ultra-high concurrency

prefill:
  workers: 10
  gpus: 2
  nodesPerWorker: 1
  tensorParallelSize: 2
  moeExpertParallelSize: 2
  maxBatchSize: 2
  maxNumTokens: 16640
  maxSeqLen: 8232
  engine:
    pipeline_parallel_size: 1
    print_iter_log: true
    kv_cache_config:
      enable_block_reuse: false
      dtype: fp8
      free_gpu_memory_fraction: 0.6
    cache_transceiver_config:
      backend: UCX
      max_tokens_in_buffer: 16384
    moe_config:
      backend: TRTLLM
    nvfp4_gemm_config:
      allowed_backends:
        - cutlass
        - cublaslt
        - cutedsl
        - cuda_core
    speculative_config:
      decoding_type: MTP
      num_nextn_predict_layers: 1
    cuda_graph_config: null
    enable_attention_dp: true
    disable_overlap_scheduler: true

decode:
  workers: 1
  gpus: 8
  nodesPerWorker: 2
  tensorParallelSize: 8
  moeExpertParallelSize: 8
  maxBatchSize: 256
  maxNumTokens: 512
  maxSeqLen: 9256
  engine:
    pipeline_parallel_size: 1
    print_iter_log: true
    kv_cache_config:
      enable_block_reuse: false
      dtype: fp8
      free_gpu_memory_fraction: 0.9
    cache_transceiver_config:
      backend: UCX
      max_tokens_in_buffer: 16384
    moe_config:
      backend: CUTLASS
      use_low_precision_moe_combine: true
    nvfp4_gemm_config:
      allowed_backends:
        - cutlass
        - cublaslt
        - cutedsl
        - cuda_core
    speculative_config:
      decoding_type: MTP
      num_nextn_predict_layers: 1
    cuda_graph_config:
      batch_sizes:
        - 1
        - 2
        - 4
        - 8
        - 16
        - 24
        - 32
        - 40
        - 48
        - 56
        - 64
        - 72
        - 80
        - 88
        - 96
        - 104
        - 112
        - 120
        - 128
        - 136
        - 144
        - 152
        - 160
        - 168
        - 176
        - 184
        - 192
        - 200
        - 208
        - 216
        - 224
        - 232
        - 240
        - 248
        - 256
      enable_padding: true
    enable_attention_dp: true
    enable_lm_head_tp_in_adp: true
    stream_interval: 100
    num_postprocess_workers: 4

benchmark:
  concurrency: 2253
  isl: 8192
  osl: 1024
