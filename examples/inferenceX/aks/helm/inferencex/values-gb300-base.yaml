# InferenceX on AKS — GB300 base values
#
# SKU-specific + chart-wide defaults shared by every GB300 recipe.
# Combine with a recipe-specific values file:
#
#   helm install inferencex ./helm/inferencex \
#     -f helm/inferencex/values-gb300-base.yaml \
#     -f helm/inferencex/values-gb300-ctx1-gen4.yaml
#
# For H100/H200/etc: create values-<sku>-base.yaml with the SKU's topology,
# RDMA resource, NCCL env, and node affinity. See README §8.

# --------------------------------------------------------------------------
# Container images
# --------------------------------------------------------------------------
image:
  # TRT-LLM Dynamo runtime — pinned to match the InferenceX reference image.
  # Multi-arch manifest (x86_64 + arm64/aarch64); aarch64 is pulled on GB300.
  runtime: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:0.8.1.post2
  pullPolicy: IfNotPresent

# --------------------------------------------------------------------------
# Model configuration (DeepSeek R1 0528 FP4-v2 is the InferenceX reference)
# --------------------------------------------------------------------------
model:
  name: deepseek-r1-0528-fp4-v2
  id: nvidia/DeepSeek-R1-0528-NVFP4-v2
  localDir: nvidia_DeepSeek-R1-0528-NVFP4-v2
  mountPath: /models
  hfTokenSecret: hf-token

# --------------------------------------------------------------------------
# Cluster topology
# --------------------------------------------------------------------------
gpusPerNode: 4

gpuResource: nvidia.com/gpu
rdmaResource: rdma/ib

# --------------------------------------------------------------------------
# NCCL environment (GB300 Grace Blackwell defaults — NVL72 MNNVL fabric)
# --------------------------------------------------------------------------
ncclEnv:
  CUDA_DEVICE_ORDER: PCI_BUS_ID
  NCCL_SOCKET_IFNAME: eth0
  NCCL_DEBUG: WARN
  NCCL_IGNORE_CPU_AFFINITY: "1"
  NCCL_MNNVL_ENABLE: "1"
  NCCL_NVLS_ENABLE: "1"
  NCCL_SHM_DISABLE: "1"
  NCCL_DMABUF_ENABLE: "1"
  NCCL_P2P_DISABLE: "0"
  NCCL_P2P_NET_CHUNKSIZE: "2097152"
  NCCL_IB_QPS_PER_CONNECTION: "4"
  NCCL_IB_DISABLE: "0"
  NCCL_IB_SL: "1"
  NCCL_NET_GDR_LEVEL: PHB
  NCCL_NET_GDR_C2C: "1"
  NCCL_GRAPH_MIXING_SUPPORT: "0"
  UCX_NET_DEVICES: "mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1"
  MELLANOX_VISIBLE_DEVICES: all

# --------------------------------------------------------------------------
# TRT-LLM environment (per-stage overrides forwarded via mpirun -x)
# --------------------------------------------------------------------------
trtllmEnv:
  common:
    TLLM_OVERRIDE_LAYER_NUM: "61"
    TLLM_LOG_LEVEL: INFO
    TRTLLM_SERVER_DISABLE_GC: "1"
    TRTLLM_WORKER_DISABLE_GC: "1"
    TRTLLM_ENABLE_PDL: "1"
  decode: {}

# --------------------------------------------------------------------------
# DRA (Dynamic Resource Allocation) — MNNVL ComputeDomain on GB300
# --------------------------------------------------------------------------
dra:
  enabled: true
  claimTemplateName: inferencex-gpu

# --------------------------------------------------------------------------
# Scheduling / affinity
# --------------------------------------------------------------------------
affinity:
  nodePoolLabel: agentpool
  nodePoolValue: gb300
  topologyKey: nvidia.com/gpu.clique

# --------------------------------------------------------------------------
# Node pinning — pin workers to specific nodes for deterministic benchmarking.
# Override per-recipe if needed.
# --------------------------------------------------------------------------
nodePinning:
  enabled: false
  prefill: []
  decode: []

# --------------------------------------------------------------------------
# Storage for model weights (hostPath on /mnt/nvme — see README §5)
# --------------------------------------------------------------------------
# type: emptyDir — ephemeral, lost on pod restart
# type: hostPath — persists on node disk, survives pod restart (default for GB300)
# type: pvc      — shared PVC (ReadOnlyMany), download separately
storage:
  type: hostPath
  size: 500Gi
  hostPath: /mnt/nvme/models

# --------------------------------------------------------------------------
# NVMe initialiser DaemonSet (assembles raid0 + ext4 + mounts /mnt/nvme)
# --------------------------------------------------------------------------
# AKS does NOT pre-mount the local NVMe disks on Standard_ND128isr_GB300_v6.
# This DaemonSet runs once per node, creates /dev/md0 (raid0) across the four
# 3.5 TB Microsoft NVMe Direct Disks, formats ext4 with stride/stripe-width
# tuned for the array, and mounts at /mnt/nvme. Idempotent: nodes that already
# have /mnt/nvme mounted are no-op'd.
nvmeInit:
  enabled: true
  image: ubuntu:24.04
  mountPoint: /mnt/nvme
  raidDevice: /dev/md0
  raidChunkKB: 512
  fsBlockBytes: 4096

# --------------------------------------------------------------------------
# Model distribution — rank-0 download + MPI broadcast to every node
# --------------------------------------------------------------------------
modelDistribution:
  blobCache:
    # Set enabled=true and override the three fields below to use an Azure
    # Blob Storage account as a persistent cache between runs (azcopy
    # download/upload, MI auth). When false, every cold node downloads
    # straight from HuggingFace (slower; HF rate limits apply).
    enabled: false
    storageAccount: "" # e.g. mygb300models
    container: "" # e.g. models
    # Kubelet user-assigned MI client ID; the MI must have role
    # "Storage Blob Data Contributor" on the storage account above.
    # Look it up either from the AKS control plane:
    #   az aks show -g <RG> -n <CLUSTER> \
    #     --query identityProfile.kubeletidentity.clientId -o tsv
    # or directly from any GPU node label (AKS sets this automatically):
    #   kubectl get nodes -l agentpool=gb300 \
    #     -o jsonpath='{.items[0].metadata.labels.kubernetes\.azure\.com/kubelet-identity-client-id}'
    clientId: ""

# --------------------------------------------------------------------------
# Service configuration
# --------------------------------------------------------------------------
service:
  frontend:
    type: ClusterIP
    port: 8000

# --------------------------------------------------------------------------
# Kueue integration (optional)
# --------------------------------------------------------------------------
kueue:
  queueName: ""
