# Recipe: ctx1_gen3_tep8_batch8_eplb0_mtp3
# Topology: 1 prefill (TP=2, EP=2, 2 GPUs on 1 node) + 3 decode (TP=8, EP=8, 8 GPUs on 2 nodes)
# Total: 26 GPUs, 7 nodes
# Target concurrency: 33
# With enable_attention_dp: TP=2 and EP=2 share the same 2 GPUs (world_size=2, not 4).

prefill:
  workers: 1
  gpus: 2
  nodesPerWorker: 1
  tensorParallelSize: 2
  moeExpertParallelSize: 2
  maxBatchSize: 2
  maxNumTokens: 16640
  maxSeqLen: 8232
  engine:
    pipeline_parallel_size: 1
    print_iter_log: true
    kv_cache_config:
      enable_block_reuse: false
      dtype: fp8
      free_gpu_memory_fraction: 0.6
    cache_transceiver_config:
      backend: UCX
      max_tokens_in_buffer: 16384
    moe_config:
      backend: TRTLLM
    nvfp4_gemm_config:
      allowed_backends:
      - cutlass
      - cublaslt
      - cutedsl
      - cuda_core
    speculative_config:
      decoding_type: MTP
      num_nextn_predict_layers: 3
    cuda_graph_config: null
    enable_attention_dp: true
    disable_overlap_scheduler: true

decode:
  workers: 3
  gpus: 8
  nodesPerWorker: 2
  tensorParallelSize: 8
  moeExpertParallelSize: 8
  maxBatchSize: 8
  maxNumTokens: 32
  maxSeqLen: 9256
  engine:
    pipeline_parallel_size: 1
    print_iter_log: true
    allreduce_strategy: MNNVL
    kv_cache_config:
      enable_block_reuse: false
      dtype: fp8
      free_gpu_memory_fraction: 0.9
    cache_transceiver_config:
      backend: UCX
      max_tokens_in_buffer: 16384
    moe_config:
      backend: TRTLLM
      use_low_precision_moe_combine: true
    nvfp4_gemm_config:
      allowed_backends:
      - cutlass
      - cublaslt
      - cutedsl
      - cuda_core
    speculative_config:
      decoding_type: MTP
      num_nextn_predict_layers: 3
    cuda_graph_config:
      batch_sizes:
      - 1
      - 2
      - 4
      - 8
      enable_padding: true
    enable_attention_dp: false
    enable_lm_head_tp_in_adp: false
    stream_interval: 100
    num_postprocess_workers: 4

benchmark:
  concurrency: 33
  isl: 8192
  osl: 1024
