# Default values for amlfs-shared-storage
# This is a YAML-formatted file.

# Storage configuration
storage:
  # Provisioning mode: "dynamic" (create new AMLFS instance) or "static" (use existing AMLFS)
  provisioning: "dynamic"

  # PVC name that will be created
  pvcName: "shared-amlfs-storage"
  # Storage size for the shared volume
  size: "16Ti"
  # Access modes for the PVC
  accessModes:
    - ReadWriteMany
  # Reclaim policy (Delete for dynamic, Retain recommended for static)
  reclaimPolicy: "Delete"
  # Volume binding mode (dynamic provisioning only)
  volumeBindingMode: "Immediate"

  # AMLFS dynamic provisioning settings (used when provisioning is "dynamic")
  amlfs:
    # AMLFS SKU name
    skuName: "AMLFS-Durable-Premium-125"
    # Availability zone
    zones: "1"
    # Maintenance day of week
    maintenanceDayOfWeek: "Sunday"
    # Maintenance time of day in UTC
    maintenanceTimeOfDayUtc: "02:00"

  # Static provisioning settings — required when provisioning is "static"
  existingFilesystem:
    # The Lustre MGS IP address of the existing AMLFS instance
    mgsIPAddress: ""
    # The filesystem name (typically "lustrefs")
    filesystemName: "lustrefs"

  # Lustre mount options
  mountOptions:
    - "noatime"
    - "flock"

# Global annotations that will be applied to all resources
annotations: {}

# Global labels that will be applied to all resources
labels: {}
