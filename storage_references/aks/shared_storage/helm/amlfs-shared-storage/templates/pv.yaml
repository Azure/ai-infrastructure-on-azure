{{- if eq .Values.storage.provisioning "static" }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "amlfs-shared-storage.fullname" . }}-pv
  labels:
    {{- include "amlfs-shared-storage.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  capacity:
    storage: {{ .Values.storage.size }}
  accessModes:
    {{- range .Values.storage.accessModes }}
    - {{ . }}
    {{- end }}
  persistentVolumeReclaimPolicy: {{ .Values.storage.reclaimPolicy }}
  csi:
    driver: azurelustre.csi.azure.com
    readOnly: false
    volumeHandle: {{ include "amlfs-shared-storage.fullname" . }}-{{ .Values.storage.existingFilesystem.mgsIPAddress | replace "." "-" }}
    volumeAttributes:
      mgs-ip-address: {{ .Values.storage.existingFilesystem.mgsIPAddress | quote }}
      fs-name: {{ .Values.storage.existingFilesystem.filesystemName | quote }}
  mountOptions:
    {{- range .Values.storage.mountOptions }}
    - {{ . | quote }}
    {{- end }}
{{- end }}
