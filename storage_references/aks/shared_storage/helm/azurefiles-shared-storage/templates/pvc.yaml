apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.storage.pvcName }}
  labels:
    {{- include "azurefiles-shared-storage.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- range .Values.storage.accessModes }}
    - {{ . }}
    {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.size }}
  {{- if eq .Values.storage.provisioning "dynamic" }}
  storageClassName: {{ include "azurefiles-shared-storage.fullname" . }}-azurefiles-premium-nfs
  {{- else }}
  volumeName: {{ include "azurefiles-shared-storage.fullname" . }}-pv
  storageClassName: ""
  {{- end }}
