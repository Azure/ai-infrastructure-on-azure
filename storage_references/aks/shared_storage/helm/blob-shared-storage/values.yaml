# Default values for blob-shared-storage
# This is a YAML-formatted file.

# Storage configuration
storage:
  # Provisioning mode: "dynamic" (create new storage) or "static" (use existing storage account)
  provisioning: "dynamic"

  # PVC name that will be created
  pvcName: "shared-blob-storage"
  # Storage size for the shared volume
  size: "100Ti"
  # Azure storage account SKU (dynamic provisioning only)
  skuName: "Standard_LRS"
  # Access modes for the PVC
  accessModes:
    - ReadWriteMany
  # Reclaim policy (Delete for dynamic, Retain recommended for static)
  reclaimPolicy: "Delete"
  # Volume binding mode (dynamic provisioning only)
  volumeBindingMode: "Immediate"

  # Static provisioning settings — required when provisioning is "static"
  storageAccount:
    # Name of the existing Azure storage account
    name: ""
    # Resource group of the storage account
    resourceGroup: ""
    # Name of the existing blob container
    containerName: ""

  # Blobfuse mount options
  mountOptions:
    - "-o allow_other"
    - "--use-attr-cache=true"
    - "--cancel-list-on-mount-seconds=10"
    - "-o attr_timeout=120"
    - "-o entry_timeout=120"
    - "-o negative_timeout=120"
    - "--log-level=LOG_WARNING"
    - "--file-cache-timeout-in-seconds=120"

# Global annotations that will be applied to all resources
annotations: {}

# Global labels that will be applied to all resources
labels: {}
