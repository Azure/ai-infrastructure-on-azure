# Generation config: Grace Blackwell (GB200 / GB300) — Azure NDv6 — 4 GPUs per node
# NVSwitch / MNNVL within rack, InfiniBand across racks.
# Source this file before launching NCCL tests.

GPUS_PER_NODE=4
TASKS_PER_NODE=4
CPUS_PER_TASK=24
CPU_BIND="none"

# NCCL / MPI environment
export NCCL_DEBUG=WARN
export NCCL_SOCKET_IFNAME=eth0
export NCCL_IGNORE_CPU_AFFINITY=1
export CUDA_DEVICE_ORDER=PCI_BUS_ID

# NCCL RDMA/SHARP plugins (needed for dmabuf support)
export LD_LIBRARY_PATH=/usr/local/nccl-rdma-sharp-plugins/lib:${LD_LIBRARY_PATH:-}

# NCCL — intra-rack (NVLink / MNNVL)
export NCCL_MNNVL_ENABLE=1
export NCCL_NVLS_ENABLE=1
export NCCL_SHM_DISABLE=1
export NCCL_DMABUF_ENABLE=1
export NCCL_P2P_DISABLE=0
export NCCL_P2P_NET_CHUNKSIZE=$((2 * 1024 * 1024))
export NCCL_IB_QPS_PER_CONNECTION=4

# NCCL — inter-rack (InfiniBand)
export NCCL_IB_DISABLE=0
export NCCL_IB_SL=1
export NCCL_NET_GDR_LEVEL=PHB
export NCCL_NET_GDR_C2C=1
export UCX_NET_DEVICES=mlx5_ib0:1

# Mellanox / device visibility
export MELLANOX_VISIBLE_DEVICES=all
