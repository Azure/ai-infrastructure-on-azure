# Generation config: Hopper (H100 / H200) — Azure NDv5 — 8 GPUs per node
# NVSwitch intra-node, InfiniBand inter-node, SHARP enabled.
# Source this file before launching NCCL tests.

GPUS_PER_NODE=8
TASKS_PER_NODE=8
CPUS_PER_TASK=12
CPU_BIND="mask_cpu:ffffff000000,ffffff000000,ffffff,ffffff,ffffff000000000000000000,ffffff000000000000000000,ffffff000000000000,ffffff000000000000"

# NCCL / MPI environment
export OMPI_MCA_coll_hcoll_enable=0
export NCCL_DEBUG=WARN
export NCCL_SOCKET_IFNAME=eth0
export NCCL_IGNORE_CPU_AFFINITY=1
export CUDA_DEVICE_ORDER=PCI_BUS_ID

# NCCL — intra-node
export NCCL_TOPO_FILE=/opt/microsoft/ndv5-topo.xml
export NCCL_PXN_DISABLE=1
export NCCL_MIN_NCHANNELS=32
export NCCL_P2P_NET_CHUNKSIZE=$((2 * 1024 * 1024))

# NCCL — inter-node (InfiniBand)
export UCX_TLS=rc
export UCX_NET_DEVICES=mlx5_ib0:1
export NCCL_IB_PCI_RELAXED_ORDERING=1
export NCCL_IB_QPS_PER_CONNECTION=4
export NCCL_COLLNET_ENABLE=1

# SHARP
export SHARP_SMX_UCX_INTERFACE=mlx5_ib0:1
export SHARP_COLL_ENABLE_SAT=1
export SHARP_COLL_LOG_LEVEL=3
export SHARP_COLL_ENABLE_PCI_RELAXED_ORDERING=1
